models:
  planner:
    model: claude-opus-4-7
    temperature: 0.7
    max_tokens: 4096

  generator:
    default:
      model: claude-sonnet-4-6
      temperature: 0.2
      max_tokens: 8192
    c:
      model: claude-opus-4-7
      temperature: 0.2
      max_tokens: 8192
    cpp:
      model: claude-opus-4-7
      temperature: 0.2
      max_tokens: 8192

  verifier:
    model: claude-sonnet-4-6
    temperature: 0.0
    max_tokens: 2048

  reviewers:
    functional:
      model: gpt-5-mini
      temperature: 0.0
      max_tokens: 16384
    security:
      model: claude-sonnet-4-6
      temperature: 0.0
      max_tokens: 4096
    performance:
      model: gpt-5-mini
      temperature: 0.0
      max_tokens: 16384

  aggregator:
    normal:
      model: claude-haiku-4-5-20251001
      temperature: 0.0
      max_tokens: 1024
    failure_report:
      model: claude-sonnet-4-6
      temperature: 0.3
      max_tokens: 2048

api_keys:
  # Values starting with ${...} are resolved from environment variables at load time
  anthropic: ${ANTHROPIC_API_KEY}
  openai: ${OPENAI_API_KEY}
